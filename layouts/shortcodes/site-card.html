{{- $url := .Get "url" -}}
{{- $title := .Get "title" -}}
{{- $image := .Get "image" -}}
{{- $alt := .Get "alt" | default (printf "%s screenshot" $title) -}}
{{- $description := .Inner | strings.TrimSpace | markdownify | replaceRE "(?s)<a\\b[^>]*>(.*?)</a>" "$1" | safeHTML -}}

<a class="favorite-site-card" href="{{ $url | safeURL }}" target="_blank" rel="noopener noreferrer">
  <figure class="favorite-site-card__media">
    <img class="favorite-site-card__image" src="{{ $image | safeURL }}" alt="{{ $alt }}" loading="lazy">
  </figure>
  <div class="favorite-site-card__body">
    <h3 class="favorite-site-card__title">{{ $title }}</h3>
    <div class="favorite-site-card__description">{{ $description }}</div>
  </div>
</a>
