{{- if or .IsHome (eq .Layout "search") }}
<div class="bg-glow">
  <div class="blob-shell blob-shell-1"><div class="blob blob-1"></div></div>
  <div class="blob-shell blob-shell-2"><div class="blob blob-2"></div></div>
  <div class="blob-shell blob-shell-3"><div class="blob blob-3"></div></div>
</div>
<script>
  (() => {
    const init = () => {
      const bg = document.querySelector('.bg-glow');
      const geometry = window.BlobLayoutGeometry;

      if (!bg || !geometry || window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;

      const shells = Array.from(bg.querySelectorAll('.blob-shell'));
      const anchorSelectors = ['.profile_inner', '#searchbox', '.home-info', '#searchInput'];
      const states = shells.map(shell => ({
        shell,
        centerX: 0,
        centerY: 0,
        currentX: 0,
        currentY: 0,
        targetX: 0,
        targetY: 0
      }));

      const physics = {
        radius: 420,
        maxPush: 120,
        smoothness: 0.03
      };

      let mouseX = 0;
      let mouseY = 0;
      let pointerActive = false;
      let resizeObserver = null;

      const findAnchor = () => {
        for (const selector of anchorSelectors) {
          const element = document.querySelector(selector);
          if (element) return element;
        }

        return null;
      };

      const applyGeometry = () => {
        const anchor = findAnchor();
        const layout = geometry.resolveBlobLayout({
          viewport: { width: window.innerWidth, height: window.innerHeight },
          anchorRect: anchor ? anchor.getBoundingClientRect() : null
        });

        physics.radius = layout.interaction.radius;
        physics.maxPush = layout.interaction.maxPush;

        layout.blobs.forEach((blob, index) => {
          const state = states[index];
          state.centerX = blob.centerX;
          state.centerY = blob.centerY;
          state.shell.style.left = `${blob.left.toFixed(2)}px`;
          state.shell.style.top = `${blob.top.toFixed(2)}px`;
          state.shell.style.width = `${blob.size.toFixed(2)}px`;
          state.shell.style.height = `${blob.size.toFixed(2)}px`;
        });

        if (resizeObserver) {
          resizeObserver.disconnect();
          resizeObserver = null;
        }

        if (anchor && typeof ResizeObserver !== 'undefined') {
          resizeObserver = new ResizeObserver(() => applyGeometry());
          resizeObserver.observe(anchor);
        }
      };

      const render = () => {
        states.forEach(state => {
          if (pointerActive) {
            const dx = state.centerX - mouseX;
            const dy = state.centerY - mouseY;
            const distance = Math.hypot(dx, dy);

            if (distance < physics.radius) {
              const intensity = Math.sin(((physics.radius - distance) / physics.radius) * (Math.PI / 2));
              const safeDistance = distance || 1;
              state.targetX = (dx / safeDistance) * physics.maxPush * intensity;
              state.targetY = (dy / safeDistance) * physics.maxPush * intensity;
            } else {
              state.targetX = 0;
              state.targetY = 0;
            }
          } else {
            state.targetX = 0;
            state.targetY = 0;
          }

          state.currentX += (state.targetX - state.currentX) * physics.smoothness;
          state.currentY += (state.targetY - state.currentY) * physics.smoothness;
          state.shell.style.transform = `translate3d(${state.currentX.toFixed(2)}px, ${state.currentY.toFixed(2)}px, 0)`;
        });

        requestAnimationFrame(render);
      };

      window.addEventListener('mousemove', event => {
        pointerActive = true;
        mouseX = event.clientX;
        mouseY = event.clientY;
      });

      window.addEventListener('mouseleave', () => {
        pointerActive = false;
      });

      window.addEventListener('resize', applyGeometry);
      window.addEventListener('scroll', applyGeometry, { passive: true });

      applyGeometry();
      requestAnimationFrame(render);
    };

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init, { once: true });
    } else {
      init();
    }
  })();
</script>
{{- end }}
{{ if and .IsPage (eq .Section "posts") }}
<script defer src="https://vercount.one/js"></script>
<div id="post-view-counter" style="width: 100%; text-align: center; font-size: 0.9em; opacity: 0.7; margin-top: 6px;">
  <span id="busuanzi_container_page_pv">
    {{ if eq .Lang "zh" }}本文阅读量: <span id="busuanzi_value_page_pv">--</span> 次{{ else }}Post views: <span id="busuanzi_value_page_pv">--</span>{{ end }}
  </span>
</div>
<script>
  (() => {
    const counter = document.getElementById('post-view-counter');
    if (!counter) return;

    const postFooter = document.querySelector('.post-footer');
    if (!postFooter) return;

    const shareButtons = postFooter.querySelector('.share-buttons');
    if (shareButtons) {
      shareButtons.insertAdjacentElement('afterend', counter);
    } else {
      postFooter.appendChild(counter);
    }
  })();
</script>
{{ end }}
